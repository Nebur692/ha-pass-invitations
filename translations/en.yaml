configuration:
  admin_username:
    name: Admin Username
    description: "Only needed for direct port access. Not required when using HA sidebar."
  admin_password:
    name: Admin Password
    description: "Only needed for direct port access. Not required when using HA sidebar. Min 8 characters."
  app_name:
    name: App Name
    description: Display name shown to guests
  contact_message:
    name: Contact Message
    description: Message shown when a guest link expires
  brand_bg:
    name: Background Color
    description: "Hex color for page background (e.g., #F2F0E9)"
  brand_primary:
    name: Primary Color
    description: "Hex color for accents and buttons (e.g., #D9523C)"
  guest_url:
    name: Guest URL
    description: "External base URL for guest links (e.g., https://guest.myhouse.com). Leave empty for local network."
  timezone:
    name: Timezone
    description: "IANA timezone used to evaluate recurring weekly access windows (e.g. Europe/Madrid). Only matters if you use a recurring schedule on a token."
  local_network_cidrs:
    name: Home Network CIDRs
    description: "JSON array of CIDRs considered 'home network' (e.g. [\"192.168.0.0/16\"]). When set, guests can only trigger locks/covers/buttons while connected to one of these ranges. Leave empty for no restriction."
